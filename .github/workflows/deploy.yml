name: Deploy Project on Server
# Workflow reutilizable: lo invoca el orquestador (orchestrator.yml)
# github.ref_name es la rama que disparo el orquestador (main o develop)
on:
  workflow_call:

env:
  DOCKER_IMAGE: personal-project-back
  IMAGE_TAG_DEV: dev
  IMAGE_TAG_PROD: latest

jobs:
  deploy-dev:
    # Deploy del entorno de desarrollo (solo rama develop)
    if: ${{ github.ref_name == 'develop' }}
    runs-on: self-hosted
    steps:
      - name: Descargar el repositorio (para leer el docker-compose)
        uses: actions/checkout@v7.0.0

      # La API exige estas variables (fail-fast). El .env esta gitignored y
      # actions/checkout limpia archivos untracked, por eso se regenera aqui.
      - name: Crear archivo .env para la API
        env:
          BACKEND_SECRET_KEY: ${{ secrets.BACKEND_SECRET_KEY }}
        run: |
          echo "SECRET_KEY=$BACKEND_SECRET_KEY" > .env
          echo "ALGORITHM=HS256" >> .env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=30" >> .env
          echo "DATABASE_URL=sqlite:///./data/database.db" >> .env

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2
        with:
          version: latest

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: carlosrauda64
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Download image and deploy
        env:
          DOCKER_USERNAME: carlosrauda64
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
          IMAGE_TAG_DEV: ${{ env.IMAGE_TAG_DEV }}
        run: |
          docker compose --profile dev pull
          docker compose --profile dev up -d --remove-orphans

  deploy-prod:
    # Deploy del entorno de producción (solo rama main)
    if: ${{ github.ref_name == 'main' }}
    runs-on: self-hosted
    steps:
      - name: Descargar el repositorio (para leer el docker-compose)
        uses: actions/checkout@v7.0.0

      # La API exige estas variables (fail-fast). El .env esta gitignored y
      # actions/checkout limpia archivos untracked, por eso se regenera aqui.
      - name: Crear archivo .env para la API
        env:
          BACKEND_SECRET_KEY: ${{ secrets.BACKEND_SECRET_KEY }}
        run: |
          echo "SECRET_KEY=$BACKEND_SECRET_KEY" > .env
          echo "ALGORITHM=HS256" >> .env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=30" >> .env
          echo "DATABASE_URL=sqlite:///./data/database.db" >> .env

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2
        with:
          version: latest

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: carlosrauda64
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Download image and deploy
        env:
          DOCKER_USERNAME: carlosrauda64
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
          IMAGE_TAG_PROD: ${{ env.IMAGE_TAG_PROD }}
        run: |
          docker compose --profile prod pull
          docker compose --profile prod up -d --remove-orphans
